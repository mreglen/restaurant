{% extends "base.html" %}

{% block title %}{{ 'Редактировать' if employee else 'Добавить' }} сотрудника - Yummy Restaurant{% endblock %}

{% block content %}
<section class="staff-section">
  <div class="container" data-aos="fade-up">
    <div class="mb-4">
      <a href="{{ url('employee_list') }}" class="text-white-50"><i class="bi bi-arrow-left me-1"></i> Назад к списку</a>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card">
          <h2 class="mb-4">{{ 'Редактировать' if employee else 'Добавить' }} сотрудника</h2>
          
          <form method="post">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Фамилия</label>
                <input type="text" name="last_name" class="form-control bg-dark text-white border-secondary" value="{{ employee.last_name if employee else '' }}" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Имя</label>
                <input type="text" name="first_name" class="form-control bg-dark text-white border-secondary" value="{{ employee.first_name if employee else '' }}" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Отчество</label>
                <input type="text" name="patronymic" class="form-control bg-dark text-white border-secondary" value="{{ employee.patronymic if employee else '' }}">
              </div>

              <div class="col-md-6">
                <label class="form-label">Логин (Username)</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" value="{{ employee.username if employee else '' }}" required {{ 'readonly' if employee else '' }}>
              </div>
              <div class="col-md-6">
                <label class="form-label">Пароль {{ '(оставьте пустым для сохранения текущего)' if employee else '' }}</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" {{ 'required' if not employee else '' }}>
              </div>

              <div class="col-md-6">
                <label class="form-label">Телефон</label>
                <input type="text" name="phone" class="form-control bg-dark text-white border-secondary" value="{{ employee.phone if employee else '' }}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Роль</label>
                <select name="role" class="form-select bg-dark text-white border-secondary" required>
                  {% for r in roles %}
                    <option value="{{ r.id }}" {{ 'selected' if employee and employee.role == r.id else '' }}>{{ r.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-yummy px-5">{{ 'Сохранить изменения' if employee else 'Добавить сотрудника' }}</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
