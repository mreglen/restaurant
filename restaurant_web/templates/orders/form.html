{% extends "base.html" %}

{% block title %}{{ 'Редактировать' if order else 'Создать' }} заказ - Yummy Restaurant{% endblock %}

{% block content %}
<section class="staff-section">
  <div class="container" data-aos="fade-up">
    <div class="mb-4">
      <a href="{{ url('order_list') }}" class="text-white-50"><i class="bi bi-arrow-left me-1"></i> Назад к списку</a>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card">
          <h2 class="mb-4">{{ 'Редактировать' if order else 'Создать новый' }} заказ</h2>
          
          <form method="post">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Клиент</label>
                <select name="client_id" class="form-select bg-dark text-white border-secondary">
                  <option value="">Гость (без регистрации)</option>
                  {% for client in all_clients %}
                    <option value="{{ client.id }}" {{ 'selected' if order and order.client_id == client.id else '' }}>
                        {{ client|person_fio }}
                    </option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Столик (номер)</label>
                <input type="number" name="table_number" class="form-control bg-dark text-white border-secondary" value="{{ order.table_number if order else '' }}" required>
              </div>

              <div class="col-md-12">
                <label class="form-label">Статус заказа</label>
                <select name="status" class="form-select bg-dark text-white border-secondary">
                  <option value="В работе" {{ 'selected' if order and order.status == 'В работе' else '' }}>В работе</option>
                  <option value="Готов" {{ 'selected' if order and order.status == 'Готов' else '' }}>Готов</option>
                  <option value="Оплачен" {{ 'selected' if order and order.status == 'Оплачен' else '' }}>Оплачен</option>
                </select>
              </div>

              <div class="col-md-12 mt-4">
                <label class="form-label">Выберите блюда</label>
                <div class="glass-card bg-dark bg-opacity-50 p-3" style="max-height: 400px; overflow-y: auto;">
                  {% for dish in all_dishes %}
                    <div class="form-check mb-2">
                      <input class="form-check-input" type="checkbox" name="dish_ids" value="{{ dish.id }}" id="dish_{{ dish.id }}" {{ 'checked' if dish.id in current_dish_ids else '' }}>
                      <label class="form-check-label d-flex justify-content-between w-100" for="dish_{{ dish.id }}">
                        <span>{{ dish.name }}</span>
                        <span class="text-danger">{{ dish.price|format_price }}</span>
                      </label>
                    </div>
                  {% endfor %}
                </div>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-yummy px-5">{{ 'Сохранить изменения' if order else 'Создать заказ' }}</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
