{% extends "base.html" %}

{% block title %}{{ 'Редактировать' if dish else 'Добавить' }} блюдо - Yummy Restaurant{% endblock %}

{% block content %}
<section class="staff-section">
  <div class="container" data-aos="fade-up">
    <div class="mb-4">
      <a href="{{ url('dish_list') }}" class="text-white-50"><i class="bi bi-arrow-left me-1"></i> Назад к списку</a>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card">
          <h2 class="mb-4">{{ 'Редактировать' if dish else 'Добавить' }} блюдо</h2>
          
          <form method="post">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            
            <div class="mb-3">
              <label class="form-label">Название блюда</label>
              <input type="text" name="name" class="form-control bg-dark text-white border-secondary" value="{{ dish.name if dish else '' }}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Описание</label>
              <textarea name="description" class="form-control bg-dark text-white border-secondary" rows="4">{{ dish.description if dish else '' }}</textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Цена (₽)</label>
              <input type="number" step="0.01" name="price" class="form-control bg-dark text-white border-secondary" value="{{ dish.price if dish else '' }}" required>
            </div>

            <div class="mt-4">
              <button type="submit" class="btn btn-yummy px-5">{{ 'Сохранить изменения' if dish else 'Создать блюдо' }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
